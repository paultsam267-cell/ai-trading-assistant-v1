name: ai-trading-scanner-daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"
      timezone: "Europe/Athens"

concurrency:
  group: ai-trading-scanner-daily-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-daily-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      SCAN_CHAINS: "solana,bsc"
      MIN_MARKET_CAP: "80000"
      MAX_MARKET_CAP: "3000000"
      MIN_LIQUIDITY: "30000"
      MIN_H24_VOLUME: "50000"
      MAX_AGE_HOURS: "72"
      MAX_TOKENS_PER_CHAIN: "60"
      MAX_REPORT_ITEMS: "8"
      REQUEST_TIMEOUT: "25"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scanner
        run: python scanner.py
