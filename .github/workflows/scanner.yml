name: scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore last scanner state
        uses: actions/cache@v4
        with:
          path: .scanner-state.json
          key: scanner-state-${{ github.run_id }}
          restore-keys: |
            scanner-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

          - name: Run real scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCAN_CHAINS: "solana,bsc"
          MIN_MARKET_CAP: "80000"
          MAX_MARKET_CAP: "3000000"
          MIN_LIQUIDITY: "50000"
          MIN_H1_VOLUME: "30000"
          MIN_SPIKE_RATIO: "3.5"
          MIN_PRICE_MOVE_PCT: "12"
          ALERT_COOLDOWN_MIN: "240"
          TOP_N: "3"
        run: python scanner.py 
